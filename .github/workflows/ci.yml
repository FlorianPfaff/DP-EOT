name: CI and benchmark

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-and-benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,plot]"

      - name: Run tests
        run: python -m pytest -q

      - name: Run two-target benchmark
        run: |
          python -m dpeot.experiments.export_two_target_benchmark \
            --num-trials 100 \
            --base-seed 7 \
            --output-dir results

      - name: Run detector negative controls
        run: |
          python -m dpeot.experiments.export_negative_controls \
            --num-trials 100 \
            --base-seed 11000 \
            --output-dir results

      - name: Run detector threshold sweep
        run: |
          python -m dpeot.experiments.export_detector_threshold_sweep \
            --num-trials 25 \
            --base-seed 13000 \
            --output-dir results/detector_threshold_sweep \
            --figure-dir figures

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            results/
            figures/detector_threshold_sweep.png
